run:
  timeout: 5m
  tests: true

linters:
  enable-all: true
  disable:
    # Too strict for this project
    - exhaustruct
    - gochecknoglobals
    - gochecknoinits
    - wsl
    - lll
    - funlen
    - cyclop
    - nestif
    - godox
    - godot
    - gofumpt
    - varnamelen
    - tagliatelle
    # Conflict with other linters
    - gci
    - goimports
    # Not suitable for this project
    - ireturn
    - depguard
    - gosmopolitan
    - mnd
    - nlreturn
    - wrapcheck
    - err113
    - paralleltest
    - thelper
    - testifylint
    - intrange
    - nonamedreturns
    - usetesting
    - unparam
    - interfacebloat
    - dupl
    - maintidx
    - errname
    - tagalign
    - usestdlibvars
    - tenv
    - perfsprint
    - forbidigo
    - forcetypeassert
    - errchkjson
    - gocritic
    - goconst
    - testpackage
    # contextcheck 对后台 goroutine 场景大量误报（worker、async email、fallback audit log 等）
    # 项目用 // nosec G118 显式标注异步 context.Background() 用法，
    # 并用 revive: context-as-argument 规则保证 ctx 作为参数传递的正确性
    - contextcheck

linters-settings:
  gocyclo:
    min-complexity: 20
  gocognit:
    min-complexity: 40
  dupl:
    threshold: 150
  goconst:
    min-len: 3
    min-occurrences: 5
  misspell:
    locale: US
  govet:
    enable-all: true
    disable:
      # fieldalignment 仅优化结构体内存布局（pointer bytes），非正确性问题
      # 强制启用会破坏字段逻辑分组（按类型而非语义排序），且每次新增字段都需重排，维护成本高
      - fieldalignment
      # shadow 对 if err := ...; err != nil 模式大量误报
      # 项目用 := 局部作用域是有意为之，shadow 检查收益低于噪音成本
      - shadow
  revive:
    rules:
      - name: blank-imports
      - name: context-as-argument
      - name: context-keys-type
      - name: dot-imports
      - name: error-return
      - name: error-strings
      - name: error-naming
      - name: exported
      - name: increment-decrement
      - name: var-naming
      - name: var-declaration
      - name: package-comments
      - name: range
      - name: receiver-naming
      - name: time-naming
      - name: unexported-return
      - name: indent-error-flow
      - name: errorf
  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance
      - opinionated
    enabled-checks:
      - dupImport
      - ifElseChain
      - nestingReduce
      - paramTypeCombine
      - commentedOutCode
  staticcheck:
    checks:
      - all
  stylecheck:
    checks:
      - all

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - gosec
        - dupl
    - path: cmd/
      linters:
        - errcheck
        - gocognit
        - gocyclo
  max-issues-per-linter: 100
  max-same-issues: 10
