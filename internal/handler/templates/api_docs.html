<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSO API 文档 — Scalar</title>
    <!-- Scalar 1.x 通过 meta[property=csp-nonce] 读取 nonce 并设置到其动态注入的 <style> 上 -->
    <!-- 缺少此 meta 标签会导致 Scalar 注入的 style 元素无 nonce，被 CSP 阻止，样式完全失效 -->
    <meta property="csp-nonce" content="{{.Nonce}}">
    <!-- Scalar JS 通过 //go:embed 内嵌并由同源路由 /api/v1/admin/api-docs/scalar.js 提供，完全离线 -->
    <script nonce="{{.Nonce}}" src="{{.ScalarJSURL}}"></script>
    <style nonce="{{.Nonce}}">
        html, body { margin: 0; padding: 0; height: 100%; }
        #scalar-container { height: 100vh; }
    </style>
</head>
<body>
<div id="scalar-container"></div>
<script nonce="{{.Nonce}}">
    // 渲染 Scalar API Reference（Scalar 1.x 用 createApiReference 函数式 API）
    // 配置文档：https://github.com/scalar/scalar
    // 注意：Scalar 1.x 已移除 spec: {url} 结构，必须用顶层 url 字段
    var configuration = {
        // OpenAPI 规范 URL（Scalar 1.x 顶层字段，旧版 spec.url 已被 Zod 拒绝）
        url: "{{.SpecURL}}",
        // 主题（Scalar 1.x 内置 14 个：default, alternate, moon, purple, solarized, bluePlanet, deepSpace, saturn, kepler, elysiajs, fastify, mars, laserwave, none）
        theme: 'purple',
        // 默认暗色（管理员调试场景）
        darkMode: true,
        // 显示数据模型（schemas）
        hideModels: false,
        // 集成自定义服务器列表
        servers: [
            { url: "{{.BaseURL}}", name: "当前实例" }
        ],
        // 默认携带认证：从 localStorage 读取管理员 token
        authentication: {
            apiKey: {
                token: localStorage.getItem('sso_admin_token') || ''
            }
        },
        // 元数据
        metaData: {
            title: "SSO API 文档",
            description: "OAuth 2.0 / OpenID Connect 单点登录服务 API"
        },
        // 显示下载 OpenAPI 规范的链接
        hideDownloadButton: false,
        // 显示侧边栏
        hideSidebar: false,
        // 持久化设置（localStorage）
        persistAuth: true
    };

    // Scalar 1.x 推荐的初始化方式
    // 脚本已在 body 末尾加载，此时 Scalar 全局对象已就绪
    if (typeof Scalar !== 'undefined' && Scalar.createApiReference) {
        Scalar.createApiReference('#scalar-container', configuration);
    } else {
        // 兜底：等待 DOMContentLoaded
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof Scalar !== 'undefined' && Scalar.createApiReference) {
                Scalar.createApiReference('#scalar-container', configuration);
            } else {
                console.error('Scalar 全局对象未加载，请检查 /api-docs/scalar.js 是否可访问');
            }
        });
    }
</script>
</body>
</html>
