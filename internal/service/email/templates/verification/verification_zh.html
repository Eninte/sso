{{define "content"}}
<h2>您好，{{.Username}}！</h2>
<p>感谢您注册我们的服务。请点击下面的按钮验证您的邮箱地址：</p>

<div class="button-container">
    <a href="{{.ActionURL}}" class="button">{{.ActionText}}</a>
</div>

<p style="color: #999999; font-size: 12px; margin-top: 15px;">
    如果按钮无法使用，请复制以下链接到浏览器：<br>
    <a href="{{.ActionURL}}" style="color: #667eea; word-break: break-all;">{{.ActionURL}}</a>
</p>

{{if .SecurityNote}}
<div class="security-note">
    <strong>⚠️ 安全提示</strong>
    {{.SecurityNote}}
</div>
{{else}}
<div class="security-note">
    <strong>⚠️ 安全提示</strong>
    此链接将在15分钟后失效。如果您没有注册此账户，请忽略此邮件。
</div>
{{end}}
{{end}}
