name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: sso
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: sso_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        env:
          REDIS_PASSWORD: testpassword
        options: >-
          --health-cmd "redis-cli -a testpassword ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.5'
          cache: true

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest

      - name: Install golang-migrate
        run: go install -tags 'postgres' github.com/golang-migrate/migrate/v4/cmd/migrate@latest

      - name: Run database migrations
        env:
          DATABASE_URL: postgres://sso:testpassword@localhost:5432/sso_test?sslmode=disable
        run: migrate -path ./migrations -database "$DATABASE_URL" up

      - name: Run tests
        env:
          DATABASE_URL: postgres://sso:testpassword@localhost:5432/sso_test?sslmode=disable
          # helpers_internal_test.go::TestHandleSetupTestDB_RealDB 直接读取 DB_* 构造请求体
          DB_HOST: localhost
          DB_PORT: "5432"
          DB_NAME: sso_test
          DB_USER: sso
          DB_PASSWORD: testpassword
          DB_SSL_MODE: disable
          REDIS_TEST_ADDR: localhost:6379
          REDIS_PASSWORD: testpassword
          # 真实 DB/Redis 连接测试的统一重试与超时参数
          # 由 internal/util/testutil 包读取，全仓所有真实 DB/Redis 测试共享
          # service container 启动后偶尔有短暂抖动，测试内自带重试
          TEST_CONN_MAX_RETRIES: "3"
          TEST_CONN_BASE_DELAY: "500ms"
          TEST_CONN_TIMEOUT: "30s"
        # 覆盖率统计排除：
        #   - app 组合根（由 E2E 覆盖）
        #   - store/mock（生成代码）
        #   - sdks/（客户端 SDK，独立于 SSO 服务）
        #   - internal/testing/（测试基础设施，非业务代码）
        #   - cmd/（可执行入口，由 E2E 覆盖）
        # -p 1 禁用包级并行：多个测试包共享同一 PostgreSQL（store/handler/service），
        # 并行执行时 cleanup（DELETE ... LIKE 'test-%'）会互相删除数据导致失败
        run: |
          PACKAGES=$(go list ./... | grep -v '/internal/app' | grep -v '/store/mock' | grep -v '/sdks/' | grep -v '/internal/testing/' | grep -v '/cmd/' | tr '\n' ' ')
          gotestsum --junitfile test-results.xml --format pkgname --rerun-fails=2 --packages="$PACKAGES" -- \
            -race -p 1 -timeout 180s -tags=integration -coverprofile=coverage.out $PACKAGES

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results.xml

      - name: Check coverage threshold
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          if [ $(echo "$COVERAGE < 80" | bc) -eq 1 ]; then
            echo "Coverage $COVERAGE% is below threshold 80%"
            exit 1
          fi
          echo "Coverage: $COVERAGE%"

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.out
          fail_ci_if_error: false

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.5'
          cache: true

      - name: Install golangci-lint
        # 预构建二进制用 go1.24 编译，无法分析 go1.26 项目
        # (Error: Go language version go1.24 < targeted Go version 1.26)
        # 改用 go install 从源码构建，确保与项目 Go 版本一致
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8

      - name: Run golangci-lint
        run: golangci-lint run ./... --timeout 10m

  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.5'
          cache: true

      - name: Install and run gosec
        # G118: 异步 goroutine 有意使用 context.Background()
        # G201: 表名已通过 validateTableName 验证
        # G202: 参数化查询，仅 LIMIT/OFFSET 索引使用 fmt.Sprint
        # G706: slog 结构化日志不受注入影响
        # G710: authURL 由服务层从预配置 OAuth 端点构造，provider 已白名单验证
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec -exclude G118,G201,G202,G706,G710 ./...

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [lint]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: sso
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: sso_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        env:
          REDIS_PASSWORD: testpassword
        options: >-
          --health-cmd "redis-cli -a testpassword ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    env:
      TEST_DATABASE_URL: postgres://sso:testpassword@localhost:5432/sso_test?sslmode=disable

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.5'
          cache: true

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest

      - name: Install golang-migrate
        run: go install -tags 'postgres' github.com/golang-migrate/migrate/v4/cmd/migrate@latest

      - name: Generate JWT keys
        run: |
          mkdir -p keys
          openssl genpkey -algorithm RSA -out keys/private.pem -pkeyopt rsa_keygen_bits:2048
          openssl rsa -pubout -in keys/private.pem -out keys/public.pem

      - name: Run database migrations
        env:
          DATABASE_URL: ${{ env.TEST_DATABASE_URL }}
        run: migrate -path ./migrations -database "$DATABASE_URL" up

      - name: Build SSO service
        run: go build -o bin/sso cmd/server/main.go

      - name: Start SSO service
        env:
          SERVER_HOST: "0.0.0.0"
          SERVER_PORT: "9090"
          SERVER_ENV: test
          DB_HOST: localhost
          DB_PORT: "5432"
          DB_NAME: sso_test
          DB_USER: sso
          DB_PASSWORD: testpassword
          DB_SSL_MODE: disable
          REDIS_ENABLE: "true"
          REDIS_HOST: localhost
          REDIS_PORT: "6379"
          REDIS_PASSWORD: testpassword
          DATABASE_URL: ${{ env.TEST_DATABASE_URL }}
          JWT_PRIVATE_KEY_PATH: ./keys/private.pem
          JWT_PUBLIC_KEY_PATH: ./keys/public.pem
          BCRYPT_COST: "10"
          RATE_LIMIT_REQUESTS: "0"
          RATE_LIMIT_WINDOW: 1m
          MFA_RECOVERY_HMAC_KEY: test-hmac-key-for-ci
          METRICS_USERNAME: metrics
          METRICS_PASSWORD: test123
          CORS_ALLOWED_ORIGINS: http://localhost:3000
          CAPTCHA_ENABLED: "false"
          STRICT_KEY_PERMISSIONS: "false"
        run: |
          ./bin/sso &
          echo $! > sso.pid
          # 等待服务健康检查通过（最多 30 秒）
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9090/health > /dev/null 2>&1; then
              echo "SSO service is healthy"
              break
            fi
            echo "Waiting for SSO service... ($i/30)"
            sleep 1
          done
          if ! curl -sf http://localhost:9090/health > /dev/null 2>&1; then
            echo "SSO service failed to start"
            exit 1
          fi

      - name: Prepare E2E test data
        env:
          DATABASE_URL: ${{ env.TEST_DATABASE_URL }}
          E2E_ADMIN_EMAIL: system@eninte.com
          E2E_ADMIN_PASSWORD: Admin1234!
        run: make test-e2e-prepare

      - name: Run E2E tests
        env:
          E2E_ADMIN_EMAIL: system@eninte.com
          E2E_ADMIN_PASSWORD: Admin1234!
          RATE_LIMIT_REQUESTS: "0"
          CAPTCHA_ENABLED: "false"
          DATABASE_URL: ${{ env.TEST_DATABASE_URL }}
        run: |
          gotestsum --junitfile e2e-results.xml --format pkgname -- \
            -race -tags=e2e ./test/e2e/...

      - name: Upload E2E test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-results
          path: e2e-results.xml

      - name: Cleanup E2E test data
        if: always()
        env:
          DATABASE_URL: ${{ env.TEST_DATABASE_URL }}
        run: make test-e2e-cleanup

      - name: Stop SSO service
        if: always()
        run: |
          if [ -f sso.pid ]; then
            kill $(cat sso.pid) 2>/dev/null || true
            rm -f sso.pid
          fi

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test, lint, security]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.5'
          cache: true

      - name: Build
        run: go build -o bin/sso cmd/server/main.go

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sso-binary
          path: bin/sso

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test, lint, security]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/sso:latest
            ${{ secrets.DOCKER_USERNAME }}/sso:${{ github.sha }}
