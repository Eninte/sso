# ============================================================================
# SSO服务 Docker Compose配置
# 阶段 4 安全增强：最小权限 + 资源限制 + 网络隔离
# ============================================================================

services:
  # --------------------------------------------------------------------------
  # SSO服务
  # --------------------------------------------------------------------------
  sso:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      # 仅绑定到本机回环地址，避免直接对外暴露
      # 生产环境应通过反向代理（nginx/traefik）转发，而非直接暴露 9090
      - "127.0.0.1:9090:9090"
    environment:
      # 服务器配置
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=9090
      - SERVER_ENV=development
      # 数据库配置
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=sso
      - DB_USER=sso
      # ⚠️ 必须设置 DB_PASSWORD 环境变量
      # 设置方法: export DB_PASSWORD=your_secure_password
      - DB_PASSWORD=${DB_PASSWORD}
      # prefer：尝试使用 SSL，若 PostgreSQL 未启用 SSL 则回退明文（容器间内网通信）
      # 生产环境必须通过 .env 设置为 require
      - DB_SSL_MODE=prefer
      # Redis配置
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis_dev_password}
      # JWT配置
      - JWT_PRIVATE_KEY_PATH=/app/keys/private.pem
      - JWT_PUBLIC_KEY_PATH=/app/keys/public.pem
      - JWT_ACCESS_TOKEN_TTL=15m
      - JWT_REFRESH_TOKEN_TTL=168h
      - JWT_ISSUER=sso
      # 安全配置
      - BCRYPT_COST=12
      - RATE_LIMIT_REQUESTS=100
      - RATE_LIMIT_WINDOW=1m
      - MAX_LOGIN_ATTEMPTS=5
      - LOCKOUT_DURATION=30m
    volumes:
      # 挂载密钥文件 (生产环境应使用Secrets)
      - ../keys:/app/keys:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    # 阶段 4 安全增强：最小权限运行
    # - read_only：根文件系统只读，防止攻击者写入恶意文件
    # - tmpfs：为 /tmp、/app/data 提供内存临时文件系统
    # - cap_drop ALL + security_opt no-new-privileges：剥夺所有 Linux capabilities 并禁止子进程提权
    read_only: true
    tmpfs:
      - /tmp:size=64M
      - /app/data:size=32M
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    # 资源限制：防止容器异常时耗尽宿主机资源（OOM/DoS）
    mem_limit: 512m
    cpus: 1.0
    memswap_limit: 768m
    # 日志大小限制：防止日志撑爆磁盘
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - sso-network

  # --------------------------------------------------------------------------
  # PostgreSQL数据库
  # --------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: sso
      POSTGRES_USER: sso
      # ⚠️ 必须设置 DB_PASSWORD 环境变量
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      # 仅绑定到本机回环地址，禁止外部直接访问数据库
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # 初始化脚本 (可选)
      # - ./init-scripts:/docker-entrypoint-initdb.d
    restart: unless-stopped
    # 阶段 4 安全增强：最小权限 + 资源限制
    # postgres 镜像初始化需要 CHOWN / SETUID / DAC_OVERRIDE / FOWNER
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - DAC_OVERRIDE
      - FOWNER
    security_opt:
      - no-new-privileges:true
    mem_limit: 1g
    cpus: 2.0
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sso -d sso"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - sso-network

  # --------------------------------------------------------------------------
  # Redis缓存
  # --------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    ports:
      # 仅绑定到本机回环地址，禁止外部直接访问 Redis
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_dev_password}
    restart: unless-stopped
    # 阶段 4 安全增强：最小权限 + 资源限制
    # redis 启动需要 CHOWN / SETUID / DAC_OVERRIDE（用于设置数据目录权限）
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - DAC_OVERRIDE
    security_opt:
      - no-new-privileges:true
    mem_limit: 256m
    cpus: 1.0
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_dev_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sso-network

# ============================================================================
# 数据卷
# ============================================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# ============================================================================
# 网络
# ============================================================================
networks:
  sso-network:
    driver: bridge
