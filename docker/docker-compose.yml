# ============================================================================
# SSOТюЇтіА Docker ComposeжЁЇуй«
# ============================================================================

version: '3.8'

services:
  # --------------------------------------------------------------------------
  # SSOТюЇтіА
  # --------------------------------------------------------------------------
  sso:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "9090:9090"
    environment:
      # ТюЇтіАтЎежЁЇуй«
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=9090
      - SERVER_ENV=development
      # ТЋ░ТЇ«т║ЊжЁЇуй«
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=sso
      - DB_USER=sso
      # Рџа№ИЈ т┐ЁжА╗У«Йуй« DB_PASSWORD уј»тбЃтЈўжЄЈ
      # У«Йуй«Тќ╣Т│Ћ: export DB_PASSWORD=your_secure_password
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_SSL_MODE=disable
      # RedisжЁЇуй«
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # JWTжЁЇуй«
      - JWT_PRIVATE_KEY_PATH=/app/keys/private.pem
      - JWT_PUBLIC_KEY_PATH=/app/keys/public.pem
      - JWT_ACCESS_TOKEN_TTL=15m
      - JWT_REFRESH_TOKEN_TTL=168h
      - JWT_ISSUER=sso
      # т«ЅтЁежЁЇуй«
      - BCRYPT_COST=10
      - RATE_LIMIT_REQUESTS=100
      - RATE_LIMIT_WINDOW=1m
      - MAX_LOGIN_ATTEMPTS=5
      - LOCKOUT_DURATION=30m
    volumes:
      # ТїѓУййт»єжњЦТќЄС╗Х (ућЪС║Дуј»тбЃт║ћСй┐ућеSecrets)
      - ../keys:/app/keys:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - sso-network

  # --------------------------------------------------------------------------
  # PostgreSQLТЋ░ТЇ«т║Њ
  # --------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: sso
      POSTGRES_USER: sso
      # Рџа№ИЈ т┐ЁжА╗У«Йуй« DB_PASSWORD уј»тбЃтЈўжЄЈ
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # тѕЮтДІтїќУёџТюг (тЈ»жђЅ)
      # - ./init-scripts:/docker-entrypoint-initdb.d
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sso -d sso"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - sso-network

  # --------------------------------------------------------------------------
  # Redisу╝ЊтГў
  # --------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sso-network

# ============================================================================
# ТЋ░ТЇ«тЇи
# ============================================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# ============================================================================
# уйЉу╗ю
# ============================================================================
networks:
  sso-network:
    driver: bridge
