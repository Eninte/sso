# ============================================================================
# SSO服务 Docker Compose配置 (测试环境 - 使用远程数据库和Redis)
# 使用方法: docker-compose -f docker-compose.test.yml up
# ============================================================================

version: '3.8'

services:
  # --------------------------------------------------------------------------
  # SSO服务 (使用远程数据库和Redis)
  # --------------------------------------------------------------------------
  sso:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "9090:9090"
    environment:
      # 服务器配置
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=9090
      - SERVER_ENV=development
      # 数据库配置 (远程服务器)
      - DB_HOST=192.168.1.3
      - DB_PORT=5432
      - DB_NAME=sso_test
      - DB_USER=sso
      - DB_PASSWORD=sso
      - DB_SSL_MODE=disable
      # Redis配置 (远程服务器)
      - REDIS_HOST=192.168.1.3
      - REDIS_PORT=6379
      - REDIS_PASSWORD=
      # JWT配置
      - JWT_PRIVATE_KEY_PATH=/app/keys/private.pem
      - JWT_PUBLIC_KEY_PATH=/app/keys/public.pem
      - JWT_ACCESS_TOKEN_TTL=15m
      - JWT_REFRESH_TOKEN_TTL=168h
      - JWT_ISSUER=sso
      # 安全配置
      - BCRYPT_COST=10
      - RATE_LIMIT_REQUESTS=100
      - RATE_LIMIT_WINDOW=1m
      - MAX_LOGIN_ATTEMPTS=5
      - LOCKOUT_DURATION=30m
    volumes:
      # 挂载密钥文件
      - ../keys:/app/keys:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - sso-network

networks:
  sso-network:
    driver: bridge
